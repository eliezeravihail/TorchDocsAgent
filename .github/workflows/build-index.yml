name: Build Index

# Full pipeline on GitHub's runners: discover → crawl → chunk+embed into Neon.
# Also serves as the weekly scheduled recrawl from the plan: the snapshot is
# cached between runs, page hash-diff + DB chunk-hash skip make repeat runs
# cheap, and every embed batch commits — a re-run always resumes.
on:
  workflow_dispatch:
    inputs:
      libraries:
        description: "comma-separated subset of the seed list (empty = all)"
        type: string
        default: ""
      model:
        description: "embedding model (HF id). A different width rebuilds the
          chunks table and re-embeds the whole corpus — this REPLACES the live
          index. Query side (eval/diagnose/app) must be run with the same model."
        type: string
        default: "BAAI/bge-small-en-v1.5"
  schedule:
    - cron: "0 3 * * 5" # weekly recrawl, Fridays 03:00 UTC

permissions:
  contents: write # the inventory job commits the refreshed dumps

concurrency: build-index # never two index builds at once

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore corpus snapshot from previous runs
        uses: actions/cache@v4
        with:
          path: _corpus
          key: corpus-${{ github.run_id }}
          restore-keys: corpus-
      - name: Cache the local embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model || 'BAAI/bge-small-en-v1.5' }}
      - run: pip install -e .
      - name: Build index
        env:
          PYTHONUNBUFFERED: "1" # stream progress lines to the log in real time
          NEON_URL: ${{ secrets.NEON }}
          # schedule events carry no inputs → fall back to the default model
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model || 'BAAI/bge-small-en-v1.5' }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.libraries }}" ]; then ARGS="--libraries ${{ inputs.libraries }}"; fi
          python scripts/build_index.py $ARGS

  # refresh the eval ground truth right after every (re)build, so the committed
  # inventory/manifest/coverage always describe the index that is actually live
  inventory:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Dump the docs-site inventory (external ground truth)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/dump_docs_inventory.py
      - name: Dump the index manifest (what we actually hold)
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
        run: python scripts/dump_index_manifest.py
      - name: Coverage gap (docs pages missing from our index)
        run: python scripts/coverage_diff.py
      - name: Commit both dumps back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/docs_inventory.jsonl eval/index_manifest.jsonl
          git diff --cached --quiet || git commit -m "eval: docs inventory + index manifest from Actions [skip ci]"
          git pull --rebase origin main  # main may have moved during the run
          git push
