name: Build Index

# Full pipeline on GitHub's runners: discover → crawl → gloss new pages → embed.
# Also serves as the weekly scheduled recrawl from the plan: the snapshot is
# cached between runs, page hash-diff + DB chunk-hash skip make repeat runs
# cheap, and every embed batch commits — a re-run always resumes.
#
# Glossing is folded INTO the update so new information never drifts out of sync
# with its Contextual-Retrieval glosses: we crawl first (no embed), gloss only
# the pages that don't have a gloss yet (incremental — the existing ones are
# skipped, so a typical recrawl glosses just the few new pages), then embed once
# with the glosses in indexed_text. A changed glosses.jsonl bumps the embed
# recipe, so the embed step re-embeds exactly what the new glosses touched.
on:
  workflow_dispatch:
    inputs:
      libraries:
        description: "comma-separated subset of the seed list (empty = all)"
        type: string
        default: ""
      model:
        description: "embedding model (HF id). A different width rebuilds the
          chunks table and re-embeds the whole corpus — this REPLACES the live
          index. Query side (eval/diagnose/app) must be run with the same model."
        type: string
        default: "BAAI/bge-small-en-v1.5"
      provider:
        description: "gloss LLM provider for new pages (openai-compat = OpenRouter/hy3
          with credit; gemini free = 20/day per model). Falls through to the other."
        type: choice
        options: [openai-compat, gemini]
        default: openai-compat
      llm:
        description: "OpenRouter slugs for glossing (fallback chain)"
        type: string
        default: "tencent/hy3:free,meta-llama/llama-3.3-70b-instruct:free"
  schedule:
    - cron: "0 3 * * 5" # weekly recrawl, Fridays 03:00 UTC

permissions:
  contents: write # the inventory job commits the refreshed dumps

concurrency: build-index # never two index builds at once

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore corpus snapshot from previous runs
        uses: actions/cache@v4
        with:
          path: _corpus
          key: corpus-${{ github.run_id }}
          restore-keys: corpus-
      - name: Cache the local embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model || 'BAAI/bge-small-en-v1.5' }}
      - run: pip install -e .
      - name: Crawl (refresh the snapshot, no embed yet)
        env:
          PYTHONUNBUFFERED: "1" # stream progress lines to the log in real time
        run: |
          ARGS="--skip-embed"
          if [ -n "${{ inputs.libraries }}" ]; then ARGS="$ARGS --libraries ${{ inputs.libraries }}"; fi
          python scripts/build_index.py $ARGS
      - name: Gloss new pages (incremental — already-glossed URLs are skipped)
        continue-on-error: true # a gloss/quota failure must not block the embed
        env:
          PYTHONUNBUFFERED: "1"
          # schedule events carry no inputs → fall back to the defaults
          TORCHDOCS_PROVIDER: ${{ inputs.provider || 'openai-compat' }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.llm || 'tencent/hy3:free,meta-llama/llama-3.3-70b-instruct:free' }}
        run: python scripts/generate_glosses.py --limit 0 --batch 30 --sleep 5
      - name: Hypothetical questions for new pages (QuOTE-style, incremental)
        continue-on-error: true # same contract as the gloss step
        env:
          PYTHONUNBUFFERED: "1"
          TORCHDOCS_PROVIDER: ${{ inputs.provider || 'openai-compat' }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.llm || 'tencent/hy3:free,meta-llama/llama-3.3-70b-instruct:free' }}
        run: python scripts/generate_questions.py --limit 0 --batch 25 --sleep 3
      - name: Commit any new enrichment (also on failure — partial progress is saved)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f index/glosses.jsonl index/questions.jsonl
          git diff --cached --quiet || git commit -m "index: content enrichment from Actions run [skip ci]"
          git pull --rebase origin main  # main may have moved during the run
          git push
      - name: Embed into Neon (now with glosses + questions in indexed_text)
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          # schedule events carry no inputs → fall back to the default model
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model || 'BAAI/bge-small-en-v1.5' }}
        run: python scripts/build_index.py --skip-crawl

  # refresh the eval ground truth right after every (re)build, so the committed
  # inventory/manifest/coverage always describe the index that is actually live
  inventory:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Dump the docs-site inventory (external ground truth)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/dump_docs_inventory.py
      - name: Dump the index manifest (what we actually hold)
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
        run: python scripts/dump_index_manifest.py
      - name: Coverage gap (docs pages missing from our index)
        run: python scripts/coverage_diff.py
      - name: Commit both dumps back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/docs_inventory.jsonl eval/index_manifest.jsonl
          git diff --cached --quiet || git commit -m "eval: docs inventory + index manifest from Actions [skip ci]"
          git pull --rebase origin main  # main may have moved during the run
          git push
