name: Diagnose retrieval

# One-off microscope on why descriptive questions miss their API reference page.
# Prints per-kind-pool distances and where the expected page ranks. Delete once
# the retrieval fix lands.
on:
  workflow_dispatch:
    inputs:
      model:
        description: "embedding model to query with — MUST match the live index."
        type: string
        default: "BAAI/bge-small-en-v1.5"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model }}
      - run: pip install -e .
      - name: Diagnose
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model }}
        run: python -m eval.diagnose_retrieval
