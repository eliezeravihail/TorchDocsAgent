name: Search

# Poke the live index from the Actions UI: hybrid retrieval acceptance tests.
on:
  workflow_dispatch:
    inputs:
      query:
        description: "search query"
        type: string
        required: true
      library:
        description: "optional library filter (core/tutorials/vision/audio)"
        type: string
        default: ""
      model:
        description: "OpenRouter model for query translation (free slugs rotate)"
        type: string
        default: "meta-llama/llama-3.3-70b-instruct:free"

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore corpus snapshot
        uses: actions/cache/restore@v4
        with:
          path: _corpus
          key: corpus-
          restore-keys: corpus-
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-base-en-v1.5
      - run: pip install -e .
      - name: Search
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          # non-English query translation via OpenRouter (Gemini free tier too limited)
          TORCHDOCS_PROVIDER: openai-compat
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.model }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.library }}" ]; then ARGS="--library ${{ inputs.library }}"; fi
          python scripts/search.py "${{ inputs.query }}" $ARGS
