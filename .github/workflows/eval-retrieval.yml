name: Eval retrieval

# Measure the retrieval layer alone against the LIVE index: recall@k + MRR over
# the 100 valid questions (eval/questions_v1.jsonl, expected sources grounded in
# the external docs inventory). Run BEFORE and AFTER retrieval-affecting changes
# and compare the aggregate line. Results are committed back for diffing.
# Set the `set` input to v0 to run the original 13-question set instead.
on:
  workflow_dispatch:
    inputs:
      set:
        description: "eval set (v1 = 100 questions, v0 = original 13)"
        type: string
        default: v1
      model:
        description: "embedding model to query with — MUST match the model the
          live index was built with, or the query vector width won't fit."
        type: string
        default: "BAAI/bge-small-en-v1.5"

permissions:
  contents: write

jobs:
  retrieval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model }}
      - run: pip install -e .
      - name: Measure recall/MRR
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_EVAL_SET: ${{ inputs.set }}
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model }}
        run: python -m eval.run_retrieval
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/retrieval_*.jsonl
          git diff --cached --quiet || git commit -m "eval: retrieval results from Actions run [skip ci]"
          git push
