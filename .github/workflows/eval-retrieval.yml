name: Eval retrieval

# Measure the retrieval layer alone against the LIVE index: recall@k + MRR per
# v0 question (expected sources in eval/retrieval_v0.jsonl). Run BEFORE and
# AFTER retrieval-affecting changes (chunking, embed recipe, ranking) and
# compare the aggregate line. Results are committed back for diffing.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrieval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-base-en-v1.5
      - run: pip install -e .
      - name: Measure recall/MRR
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
        run: python -m eval.run_retrieval
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/retrieval_v0.jsonl
          git diff --cached --quiet || git commit -m "eval: retrieval v0 results from Actions run [skip ci]"
          git push
