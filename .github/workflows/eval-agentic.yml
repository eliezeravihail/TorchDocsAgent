name: Eval agentic

# Run the 20 agentic questions (catalog / compare / recipe) through the full
# agent loop AND the single-shot grounded path, and score each finished
# answer's citations against expected_any. The headline is the delta: how much
# more of the answer the loop assembles than one retrieval pass. Needs an LLM
# (planner + generation), so it runs in Actions with the OpenRouter key.
on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider. gemini has its own free quota (~250+/day) —
          OpenRouter free is capped at 50 req/day without credits. A failed
          provider falls through to the other (both keys are set)."
        type: choice
        options: [gemini, openai-compat]
        default: gemini
      model:
        description: "OpenRouter models (fallback chain) — used when provider is
          openai-compat or as the cross-provider fallback. hy3 leads while its
          free window lasts (through 2026-07-21)."
        type: string
        default: "tencent/hy3:free,meta-llama/llama-3.3-70b-instruct:free,google/gemini-2.0-flash-exp:free"
      limit:
        description: "Run only the first N agentic questions (0 = all 20). Free-tier
          rate limits make the full set slow — start with a bounded sample."
        type: string
        default: "6"

permissions:
  contents: write

jobs:
  agentic:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5
      - run: pip install -e .
      - name: Run the agentic benchmark
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_PROVIDER: ${{ inputs.provider }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.model }}
          TORCHDOCS_AGENTIC_LIMIT: ${{ inputs.limit }}
        run: python -m eval.run_agentic
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/agentic_v1*.jsonl
          git diff --cached --quiet || git commit -m "eval: agentic results from Actions run [skip ci]"
          git push
