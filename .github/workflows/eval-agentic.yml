name: Eval agentic

# Run the 20 agentic questions (catalog / compare / recipe) through the full
# agent loop AND the single-shot grounded path, and score each finished
# answer's citations against expected_any. The headline is the delta: how much
# more of the answer the loop assembles than one retrieval pass. Needs an LLM
# (planner + generation), so it runs in Actions with the OpenRouter key.
on:
  workflow_dispatch:
    inputs:
      model:
        description: "OpenRouter models (comma-separated free slugs, a fallback chain)"
        type: string
        default: "deepseek/deepseek-chat-v3-0324:free,meta-llama/llama-3.3-70b-instruct:free"

permissions:
  contents: write

jobs:
  agentic:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5
      - run: pip install -e .
      - name: Run the agentic benchmark
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_PROVIDER: openai-compat
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.model }}
        run: python -m eval.run_agentic
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/agentic_v1.jsonl
          git diff --cached --quiet || git commit -m "eval: agentic results from Actions run [skip ci]"
          git push
