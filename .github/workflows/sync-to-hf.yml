name: Sync to Hugging Face Space

# Push main to the HF Space on every merge, then smoke-test the rebuilt Space:
# ask it a real question through the Gradio API and fail if it answers with an
# LLM/transport error. One workflow, so a broken deploy is flagged by the same
# run that made it. One-time setup: an HF token (write) as secret GITHUBPUSH.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      question:
        description: Question the smoke test asks the Space
        required: false
        default: How do I use torch.optim.SGD with momentum?

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so HF gets a normal push
          lfs: true
      - name: Push to the Space
        env:
          HF_TOKEN: ${{ secrets.GITHUBPUSH }}
        run: |
          git push --force \
            "https://eliezeravihail:${HF_TOKEN}@huggingface.co/spaces/eliezeravihail/torchdocs-agent" \
            HEAD:main

  smoke:
    needs: sync
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "gradio_client>=1" requests
      - name: Wait for RUNNING and ask a question
        env:
          HF_TOKEN: ${{ secrets.GITHUBPUSH }}
          SPACE_ID: eliezeravihail/torchdocs-agent
          SMOKE_QUESTION: ${{ github.event.inputs.question }}
        run: python scripts/smoke_space.py
