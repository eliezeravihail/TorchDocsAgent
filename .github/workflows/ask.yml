name: Ask

# Drive the full M3 agent loop (plan → tools → grounded answer) from the UI.
on:
  workflow_dispatch:
    inputs:
      question:
        description: "your question (any language)"
        type: string
        required: true
      model:
        description: "comma-separated OpenRouter :free models (fallback chain)"
        type: string
        default: "poolside/laguna-xs-2.1:free,meta-llama/llama-3.3-70b-instruct:free,deepseek/deepseek-chat-v3.1:free"

jobs:
  ask:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore corpus snapshot
        uses: actions/cache/restore@v4
        with:
          path: _corpus
          key: corpus-
          restore-keys: corpus-
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5
      - run: pip install -e .
      - name: Ask
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_PROVIDER: openai-compat
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.model }}
        run: python scripts/ask.py "${{ inputs.question }}"
