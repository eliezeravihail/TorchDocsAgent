name: Eval

# Runs the v0 eval on GitHub's runners (full network access, unlike the
# development sandbox) and commits the results file back to the branch.
on:
  workflow_dispatch:
    inputs:
      provider:
        description: "generation provider"
        type: choice
        options: [openai-compat, gemini]
        default: openai-compat
      model:
        description: "model slug for openai-compat (OpenRouter :free slugs rotate)"
        type: string
        default: "poolside/laguna-xs-2.1:free"
      grounded:
        description: "answer WITH retrieval + citations (the real M2 test); uncheck for the ungrounded baseline"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore corpus snapshot (grounded mode hydrates from it)
        uses: actions/cache/restore@v4
        with:
          path: _corpus
          key: corpus-
          restore-keys: corpus-
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5
      - run: pip install -e .
      - name: Run eval (resumes from committed results if present)
        env:
          PYTHONUNBUFFERED: "1"
          TORCHDOCS_PROVIDER: ${{ inputs.provider }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          NEON_URL: ${{ secrets.NEON }}
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.model }}
        run: |
          ARGS=""
          if [ "${{ inputs.grounded }}" = "true" ]; then ARGS="--grounded"; fi
          python -m eval.run_v0 $ARGS
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/*.jsonl
          git diff --cached --quiet || git commit -m "eval: v0 results from Actions run [skip ci]"
          git push
