name: Eval

# The measurement loop, one button:
#   suite=retrieval (default) — recall@k + MRR over the 100-question set
#     against the LIVE index, plus the rank diagnostic (where do the known-miss
#     pages actually sit in their kind-pool). No LLM needed.
#   suite=agentic — the agent-loop benchmark (loop vs single-shot coverage
#     delta). Needs LLM keys; slow on free tiers.
#   suite=all — both.
# Results are committed back to main for before/after diffing.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: "what to measure"
        type: choice
        options: [retrieval, agentic, all]
        default: retrieval
      set:
        description: "retrieval eval set (v1 = 100 questions, v0 = original 13)"
        type: string
        default: v1
      model:
        description: "embedding model to query with — MUST match the model the
          live index was built with, or the query vector width won't fit."
        type: string
        default: "BAAI/bge-small-en-v1.5"
      provider:
        description: "agentic only: LLM provider (gemini free = 20 req/day per
          model; OpenRouter free = 50/day without credits; failures fall
          through to the other provider)"
        type: choice
        options: [gemini, openai-compat]
        default: gemini
      llm:
        description: "agentic only: OpenRouter slugs (fallback chain)"
        type: string
        default: "tencent/hy3:free,meta-llama/llama-3.3-70b-instruct:free,google/gemini-2.0-flash-exp:free"
      limit:
        description: "agentic only: first N questions (0 = all 20)"
        type: string
        default: "6"

permissions:
  contents: write

jobs:
  retrieval:
    if: ${{ inputs.suite == 'retrieval' || inputs.suite == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model }}
      - run: pip install -e .
      - name: Measure recall/MRR
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_EVAL_SET: ${{ inputs.set }}
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model }}
        run: python -m eval.run_retrieval
      - name: Rank diagnostic (why do the known misses miss)
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model }}
        run: python -m eval.diagnose_retrieval
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/retrieval_*.jsonl
          git diff --cached --quiet || git commit -m "eval: retrieval results from Actions run [skip ci]"
          git pull --rebase origin main  # main may have moved during the run
          git push

  agentic:
    if: ${{ inputs.suite == 'agentic' || inputs.suite == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model }}
      - run: pip install -e .
      - name: Run the agentic benchmark
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_PROVIDER: ${{ inputs.provider }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model }}
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.llm }}
          TORCHDOCS_AGENTIC_LIMIT: ${{ inputs.limit }}
        run: python -m eval.run_agentic
      - name: Commit results back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/results/agentic_v1*.jsonl
          git diff --cached --quiet || git commit -m "eval: agentic results from Actions run [skip ci]"
          git pull --rebase origin main  # main may have moved during the run
          git push
