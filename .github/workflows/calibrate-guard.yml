name: Calibrate guard

# Re-measure the topicality threshold against the LIVE index. Run after a major
# corpus change (a re-embed, a new doc set) — the distance distribution shifts,
# so the guard's DEFAULT_TOPICALITY_MAX_DISTANCE (agent/guard.py) must be
# re-derived. This job only PRINTS the per-group distances + suggested
# threshold; read the log and update the constant by hand (a threshold change
# is a policy decision, not an automatic commit).
on:
  workflow_dispatch:
    inputs:
      model:
        description: "embedding model — MUST match the live index (query side)"
        type: string
        default: "BAAI/bge-small-en-v1.5"
      provider:
        description: "translate provider for the non-English borderline probes.
          openai-compat = paid hy3 (no daily cap); falls through to the other."
        type: choice
        options: [openai-compat, gemini]
        default: openai-compat
      llm:
        description: "OpenRouter slugs for translation (fallback chain)"
        type: string
        default: "tencent/hy3,meta-llama/llama-3.3-70b-instruct:free"

permissions:
  contents: read

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore embedding model
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.model }}
      - run: pip install -e .
      - name: Calibrate (100 on-topic vs 100 off-topic + borderline probes)
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
          TORCHDOCS_EMBED_MODEL: ${{ inputs.model }}
          TORCHDOCS_PROVIDER: ${{ inputs.provider }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          OPENAI_COMPAT_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENROUTER }}
          TORCHDOCS_OPENAI_COMPAT_MODEL: ${{ inputs.llm }}
        run: python scripts/calibrate_guard.py
