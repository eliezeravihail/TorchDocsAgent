name: Docs inventory & coverage

# Ground truth for the eval set, and a pipeline-coverage check:
#  1. docs_inventory.jsonl — every symbol/page the docs SITE publishes
#     (Sphinx objects.inv + sitemap), independent of our crawl/chunk/embed.
#  2. index_manifest.jsonl — the pages our index actually holds (from Neon).
#  3. coverage_diff — pages in the docs but missing from our index (a crawl bug).
# Runs in Actions: docs.pytorch.org and Neon are both reachable there, not in
# the dev sandbox. Both dumps are committed so the eval is authored against
# verified external sources, not against what we happened to embed.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Dump the docs-site inventory (external ground truth)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/dump_docs_inventory.py
      - name: Dump the index manifest (what we actually hold)
        env:
          PYTHONUNBUFFERED: "1"
          NEON_URL: ${{ secrets.NEON }}
        run: python scripts/dump_index_manifest.py
      - name: Coverage gap (docs pages missing from our index)
        run: python scripts/coverage_diff.py
      - name: Commit both dumps back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f eval/docs_inventory.jsonl eval/index_manifest.jsonl
          git diff --cached --quiet || git commit -m "eval: docs inventory + index manifest from Actions [skip ci]"
          git pull --rebase origin main  # main may have moved during the run
          git push
